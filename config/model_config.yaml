# ============================================================
# Model & Retrieval Configuration
# ============================================================

# --- Embedding Model ---
embedding:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 64
  max_seq_length: 256
  normalize_embeddings: true
  device: "auto"  # auto-detect GPU/CPU

# --- Chunking Strategy ---
chunking:
  # Recursive Character Splitting
  recursive:
    chunk_size: 1000
    chunk_overlap: 200
    separators:
      - "\n\n"
      - "\n"
      - ". "
      - " "
  # Semantic Chunking (sentence-level grouping by similarity)
  semantic:
    buffer_size: 3
    breakpoint_percentile_threshold: 85
    min_chunk_size: 200
    max_chunk_size: 1500

# --- Vector Store ---
vector_store:
  type: "faiss"
  index_type: "IVFFlat"  # IVFFlat for large-scale; Flat for small
  nlist: 100             # Number of Voronoi cells
  nprobe: 10             # Number of cells to search
  metric: "cosine"

# --- Hybrid Retrieval ---
retrieval:
  top_k: 10
  bm25_weight: 0.3
  dense_weight: 0.7
  rerank_top_k: 5
  use_reranker: true
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  rrf_k: 60  # Reciprocal Rank Fusion parameter

# --- LLM (for answer generation) ---
llm:
  provider: "huggingface"
  model_name: "mistralai/Mistral-7B-Instruct-v0.2"
  # Alternative: use OpenAI API
  # provider: "openai"
  # model_name: "gpt-3.5-turbo"
  temperature: 0.1
  max_tokens: 1024
  context_window: 4096

# --- Query Processing ---
query:
  enable_query_decomposition: true
  enable_hypothetical_document: true  # HyDE
  max_sub_queries: 3

# --- Evaluation ---
evaluation:
  metrics:
    - "precision_at_k"
    - "recall_at_k"
    - "mrr"
    - "ndcg"
    - "faithfulness"
    - "answer_relevancy"
  k_values: [1, 3, 5, 10]
